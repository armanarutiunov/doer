name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - run: mix deps.get
      - run: mix escript.build

      - uses: softprops/action-gh-release@v2
        with:
          files: doer
          generate_release_notes: true

      - name: Update Homebrew tap
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 doer | cut -d' ' -f1)
          RELEASE_URL="https://github.com/armanarutiunov/doer/releases/download/${GITHUB_REF_NAME}/doer"

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/armanarutiunov/homebrew-doer.git /tmp/tap
          cd /tmp/tap

          cat > Formula/doer.rb << EOF
          class Doer < Formula
            desc "Vim-inspired TUI todo app"
            homepage "https://github.com/armanarutiunov/doer"
            url "${RELEASE_URL}"
            version "${VERSION}"
            sha256 "${SHA256}"
            license "MIT"

            depends_on "erlang"

            def install
              bin.install "doer"
            end

            test do
              assert_match "doer", shell_output("#{bin}/doer --help 2>&1", 0)
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/doer.rb
          git diff --cached --quiet || (git commit -m "doer ${VERSION}" && git push)
