name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - run: mix deps.get
      - run: mix escript.build

      - uses: softprops/action-gh-release@v2
        with:
          files: doer
          generate_release_notes: true

      - name: Update Homebrew tap
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 doer | cut -d' ' -f1)

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/armanarutiumov/homebrew-doer.git /tmp/tap
          cd /tmp/tap

          sed -i "s|url \".*\"|url \"https://github.com/armanarutiumov/doer/releases/download/${GITHUB_REF_NAME}/doer\"|" Formula/doer.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/doer.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/doer.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/doer.rb
          git diff --cached --quiet || git commit -m "doer ${VERSION}" && git push
