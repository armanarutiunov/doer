name: Update Homebrew Tap

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: armanarutiumov/homebrew-doer
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=${{ github.event.release.tag_name }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Get binary SHA256
        id: sha256
        run: |
          BINARY_URL="${{ github.event.release.html_url }}/download/${{ github.event.release.tag_name }}/doer-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu"
          curl -sL "$BINARY_URL" -o /tmp/doer
          SHA256=$(shasum -a 256 /tmp/doer | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"

          cat > Formula/doer.rb << 'EOF'
          class Doer < Formula
            desc "Terminal-based todo manager with projects"
            homepage "https://github.com/armanarutiumov/doer"
            url "https://github.com/armanarutiumov/doer/releases/download/v${VERSION}/doer-${VERSION}-x86_64-unknown-linux-gnu"
            sha256 "${SHA256}"
            license "MIT"

            def install
              bin.install "doer-#{version}-x86_64-unknown-linux-gnu" => "doer"
            end

            test do
              system "#{bin}/doer", "--version"
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/doer.rb
          git commit -m "Update doer to ${{ steps.version.outputs.version }}"
          git push
